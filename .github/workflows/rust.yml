name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: proto-vps-switcher
            asset_name: proto-vps-switcher-linux-x86_64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: proto-vps-switcher.exe
            asset_name: proto-vps-switcher-windows-x86_64.exe

          - os: macos-13
            target: x86_64-apple-darwin
            binary_name: proto-vps-switcher
            asset_name: proto-vps-switcher-macos-intel

          - os: macos-latest
            target: aarch64-apple-darwin
            binary_name: proto-vps-switcher
            asset_name: proto-vps-switcher-macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare asset (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} ${{ matrix.asset_name }}

      - name: Prepare asset (Windows)
        if: runner.os == 'Windows'
        run: |
          copy target\${{ matrix.target }}\release\${{ matrix.binary_name }} ${{ matrix.asset_name }}

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
